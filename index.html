<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC图文制作</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
body {
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(255,228,235,0.3), rgba(219,234,254,0.3), rgba(254,243,199,0.3));
    backdrop-filter: blur(80px);
    z-index: -1;
}
.preview-container {
    width: 100%;
    max-width: 500px;
    position: relative;
}
.result-card {
    width: 100%;
    position: relative;
    text-align: center;
}
#resultImg {
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    display: block;
}

/* 普通悬浮文字（图片内部） */
#resultDraggableText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: pre-wrap;
    max-width: 90%;
    text-align: center;
    z-index: 2;
}

/* 拍立得模式：文字在图片下方，不在图片里 */
#resultPolaroidText {
    display: none;
    padding: 20px 0;
    text-align: center;
    white-space: pre-wrap;
    word-break: break-word;
    width: 100%;
}

.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.15);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    z-index: 999;
}

.empty-guide {
    width: 100%;
    height: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 0;
}

.go-make-btn {
    padding: 16px 40px;
    background: linear-gradient(135deg, rgba(255,228,235,0.7), rgba(219,234,254,0.7), rgba(232,221,255,0.7));
    backdrop-filter: blur(12px);
    border: 1px solid #fff;
    border-radius: 28px;
    color: #7b61ff;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 20px;
}

.guide-tip {
    font-size: 14px;
    color: #6b7280;
    max-width: 320px;
    line-height: 1.5;
}

.site-link {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #9ca3af;
}
</style>
</head>

<body>
<button class="back-btn" id="backBtn">recreate</button>

<div class="preview-container">
    <div class="result-card">
        <img id="resultImg" alt="preview">
        <div id="resultDraggableText"></div>
        <div id="resultPolaroidText"></div>

        <div class="empty-guide" id="emptyGuide">
            <button class="go-make-btn" id="goMakeBtn">📸 start making</button>
            <p class="guide-tip">Let’s start creating your custom NFC images!</p>
        </div>
    </div>
</div>

<a class="site-link">你的链接 © 2026</a>

<script>
const imgUrl = localStorage.getItem('nfcImage');
const styleData = JSON.parse(localStorage.getItem('nfcTextStyle') || '{}');
const textContent = localStorage.getItem('nfcText') || '';

const resultImg = document.getElementById('resultImg');
const resultDraggableText = document.getElementById('resultDraggableText');
const resultPolaroidText = document.getElementById('resultPolaroidText');
const emptyGuide = document.getElementById('emptyGuide');
const backBtn = document.getElementById('backBtn');
const goMakeBtn = document.getElementById('goMakeBtn');

// 有图片才显示
if (imgUrl) {
    emptyGuide.style.display = 'none';
    backBtn.style.display = 'block';
    resultImg.src = imgUrl;
}

// 回填文字
resultDraggableText.textContent = textContent;
resultPolaroidText.textContent = textContent;

// ==============================================
// 关键修复：判断是否开启拍立得模式
// ==============================================
if (styleData.isPolaroid) {
    // 拍立得：文字在图片下方，不进图片里
    resultDraggableText.style.display = 'none';
    resultPolaroidText.style.display = 'block';
} else {
    // 普通模式：文字在图上
    resultDraggableText.style.display = 'block';
    resultPolaroidText.style.display = 'none';
}

// 应用样式
if (styleData.fontSize) {
    resultDraggableText.style.fontSize = `${styleData.fontSize}px`;
    resultPolaroidText.style.fontSize = `${styleData.fontSize}px`;
}
if (styleData.color) {
    resultDraggableText.style.color = styleData.color;
    resultPolaroidText.style.color = styleData.color;
}
if (styleData.textShadow) {
    resultDraggableText.style.textShadow = styleData.textShadow;
    resultPolaroidText.style.textShadow = styleData.textShadow;
}
if (styleData.bg) {
    resultDraggableText.style.background = styleData.bg;
    resultPolaroidText.style.background = styleData.bg;
    
    if (styleData.bgPadding) {
        let p = styleData.bgPadding;
        resultDraggableText.style.padding = `${p}px ${p*1.6}px`;
        resultPolaroidText.style.padding = `${p}px ${p*1.6}px`;
    }
    if (styleData.bgRadius) {
        let r = styleData.bgRadius;
        resultDraggableText.style.borderRadius = `${r}px`;
        resultPolaroidText.style.borderRadius = `${r}px`;
    }
}

// 普通模式才用拖拽位置
if (!styleData.isPolaroid && styleData.left && styleData.top) {
    resultDraggableText.style.left = styleData.left;
    resultDraggableText.style.top = styleData.top;
    resultDraggableText.style.transform = 'none';
}

goMakeBtn.onclick = () => location.href = 'upload.html';
backBtn.onclick = () => location.href = 'upload.html';
</script>
</body>
</html>
