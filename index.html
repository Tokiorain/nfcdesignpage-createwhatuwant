<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：移动端视口适配，禁止横向滑动 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NFC图文制作 | 成果预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: #f8f9fa;
            min-height: 100vh;
            width: 100vw; /* 固定视口宽度，禁止横向滑动 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
            overflow-x: hidden; /* 彻底禁止横向滑动 */
        }
        /* 粉蓝黄弥散背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                135deg,
                rgba(255, 228, 235, 0.3),
                rgba(219, 234, 254, 0.3),
                rgba(254, 243, 199, 0.3)
            );
            backdrop-filter: blur(80px);
            -webkit-backdrop-filter: blur(80px);
            z-index: -1;
        }
        /* 预览容器：移动端精准居中 */
        .preview-container {
            width: 100%;
            max-width: 800px;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 10px;
        }
        .result-card {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* 图片上传/预览修复：移动端兼容 */
        #resultImg {
            width: 100%;
            max-width: 700px;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin: 0 auto; /* 图片居中 */
        }
        /* 拍立得文字层 */
        #resultPolaroidText {
            position: relative;
            width: 100%;
            padding-top: 16px;
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }
        #resultPolaroidText.show {
            display: block;
        }
        /* 图片文字层 */
        #resultDraggableText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        }
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            z-index: 999;
            display: none;
        }
        .back-btn:hover {
            opacity: 1;
        }
        /* 引导层：移动端绝对居中，无滑动 */
        .empty-guide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* 子元素水平居中 */
            justify-content: center; /* 子元素垂直居中 */
            text-align: center;
            padding: 30px 20px;
            box-sizing: border-box;
            min-width: 100%; /* 适配移动端宽度 */
            overflow-x: hidden; /* 禁止横向滑动 */
        }
        /* 按钮：移动端精准居中，兼容所有设备 */
        .go-make-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, 
                rgba(255, 228, 235, 0.7),
                rgba(219, 234, 254, 0.7),
                rgba(232, 221, 255, 0.7));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            color: #7b61ff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            margin: 0 auto 20px; /* 水平居中 + 底部间距 */
            box-shadow: 0 6px 20px rgba(180, 190, 250, 0.15);
            transition: all 0.3s ease;
            outline: none;
            border: none;
            /* 移动端点击兼容 */
            -webkit-tap-highlight-color: transparent;
        }
        .go-make-btn:hover {
            background: linear-gradient(135deg, 
                rgba(255, 228, 235, 0.85),
                rgba(219, 234, 254, 0.85),
                rgba(232, 221, 255, 0.85));
            box-shadow: 0 8px 24px rgba(180, 190, 250, 0.2);
            transform: translateY(-2px);
        }
        /* 摇晃动画 */
        @keyframes shake {
            0% { transform: rotate(0deg) translateY(0); }
            20% { transform: rotate(-5deg) translateY(0); }
            40% { transform: rotate(5deg) translateY(0); }
            60% { transform: rotate(-3deg) translateY(0); }
            80% { transform: rotate(3deg) translateY(0); }
            100% { transform: rotate(0deg) translateY(0); }
        }
        .btn-shake {
            animation: shake 0.5s ease-in-out;
        }
        /* 引导文字：移动端正常换行+居中 */
        .guide-tip {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 60px;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 500px;
            line-height: 1.5;
            text-align: center;
            display: inline-block;
        }
        /* 底部链接 */
        .site-link {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #9ca3af;
            text-decoration: none;
            padding: 0 10px;
            text-align: center;
            z-index: 998;
        }
        .site-link:hover {
            color: #6b7280;
            text-decoration: underline;
        }

        /* ========== 移动端专属适配 ========== */
        @media (max-width: 768px) {
            .guide-tip {
                font-size: 14px;
                max-width: 95%;
                line-height: 1.5;
            }
            .go-make-btn {
                padding: 14px 30px;
                font-size: 16px;
                margin: 0 auto 15px;
            }
            #resultImg {
                max-width: 95vw;
            }
            .empty-guide {
                padding: 20px 15px;
            }
        }
        @media (max-width: 375px) {
            .guide-tip {
                font-size: 13px;
            }
            .go-make-btn {
                padding: 12px 25px;
                font-size: 15px;
            }
            body {
                padding: 15px 10px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn">recreate</button>
    <div class="preview-container">
        <div class="result-card">
            <img id="resultImg" alt="preview">
            <div id="resultDraggableText"></div>
            <div id="resultPolaroidText"></div>
            <div class="empty-guide" id="emptyGuide">
                <button class="go-make-btn" id="goMakeBtn">📸  start making</button>
                <p class="guide-tip">Let’s start creating your custom NFC images!</p>
            </div>
        </div>
    </div>
    <a href="https://你的独立站链接.com" class="site-link" target="_blank">你的独立站名称 | copyright © 2026</a>

    <script>
        // 修复移动端localStorage兼容 + 图片上传拉取
        const imgUrl = localStorage.getItem('nfcImage') || '';
        const styleData = JSON.parse(localStorage.getItem('nfcTextStyle') || '{}');
        const resultImg = document.getElementById('resultImg');
        const resultDraggableText = document.getElementById('resultDraggableText');
        const resultPolaroidText = document.getElementById('resultPolaroidText');
        const backBtn = document.getElementById('backBtn');
        const emptyGuide = document.getElementById('emptyGuide');
        const goMakeBtn = document.getElementById('goMakeBtn');

        // 修复移动端路径跳转（避免相对路径失效）
        const getAbsolutePath = (path) => {
            const baseUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
            return baseUrl + path;
        };

        // 有图片就显示，无图片显示引导页（修复移动端图片加载）
        if (imgUrl && imgUrl.trim() !== '') {
            emptyGuide.style.display = 'none';
            backBtn.style.display = 'block';
            // 移动端图片加载兼容
            resultImg.onload = function() {
                this.style.display = 'block';
            };
            resultImg.onerror = function() {
                alert('图片加载失败，请重新上传');
                emptyGuide.style.display = 'flex';
                backBtn.style.display = 'none';
            };
            resultImg.src = imgUrl;
            initResultStyle();
        } else {
            resultImg.style.display = 'none';
            resultDraggableText.style.display = 'none';
            resultPolaroidText.style.display = 'none';
        }

        function initResultStyle() {
            const textContent = styleData.text || '';
            resultDraggableText.textContent = textContent;
            resultPolaroidText.textContent = textContent;

            if (textContent) {
                const fontSize = styleData.fontSize || 24;
                resultDraggableText.style.fontSize = `${fontSize}px`;
                resultPolaroidText.style.fontSize = `${fontSize}px`;

                resultDraggableText.style.color = styleData.color || '#ffffff';
                resultPolaroidText.style.color = styleData.color || '#ffffff';

                if (styleData.bg) {
                    resultDraggableText.style.background = styleData.bg;
                    resultPolaroidText.style.background = styleData.bg;
                    const bgPadding = styleData.bgPadding || 10;
                    resultDraggableText.style.padding = `${bgPadding}px ${bgPadding * 1.6}px`;
                    resultPolaroidText.style.padding = `${bgPadding}px ${bgPadding * 1.6}px`;
                    const bgRadius = styleData.bgRadius || 8;
                    resultDraggableText.style.borderRadius = `${bgRadius}px`;
                    resultPolaroidText.style.borderRadius = `${bgRadius}px`;
                    if (styleData.isPolaroid) {
                        resultPolaroidText.style.display = 'inline-block';
                        resultPolaroidText.style.margin = '0 auto';
                    }
                } else {
                    resultDraggableText.style.background = 'transparent';
                    resultPolaroidText.style.background = 'transparent';
                }

                resultDraggableText.style.textShadow = styleData.textShadow || '0 2px 5px rgba(0,0,0,0.6)';
                resultPolaroidText.style.textShadow = styleData.textShadow || '0 2px 5px rgba(0,0,0,0.6)';

                if (styleData.left && styleData.top && !styleData.isPolaroid) {
                    resultDraggableText.style.left = styleData.left;
                    resultDraggableText.style.top = styleData.top;
                    resultDraggableText.style.transform = 'none';
                }

                if (styleData.isPolaroid) {
                    resultDraggableText.style.display = 'none';
                    resultPolaroidText.classList.add('show');
                } else {
                    resultPolaroidText.style.display = 'none';
                    resultDraggableText.style.display = 'block';
                }
            } else {
                resultDraggableText.style.display = 'none';
                resultPolaroidText.style.display = 'none';
            }
        }

        // 修复移动端按钮跳转 + 图片上传
        backBtn.addEventListener('click', () => {
            window.location.href = getAbsolutePath('upload.html');
        });
        goMakeBtn.addEventListener('click', () => {
            window.location.href = getAbsolutePath('editor.html');
        });
        goMakeBtn.addEventListener('click', function() {
            this.classList.add('btn-shake');
            setTimeout(() => {
                this.classList.remove('btn-shake');
            }, 500);
        });

        // 窗口适配 + 移动端旋转兼容
        window.addEventListener('resize', () => {
            if (imgUrl) {
                resultImg.style.maxHeight = `${window.innerHeight - 80}px`;
            }
        });
        // 移动端初始化适配
        window.addEventListener('load', () => {
            if (imgUrl) {
                resultImg.style.maxHeight = `${window.innerHeight - 80}px`;
            }
        });
    </script>
</body>
</html>
