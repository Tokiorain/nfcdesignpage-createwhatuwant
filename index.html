<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC图文制作</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
body {
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(255,228,235,0.3), rgba(219,234,254,0.3), rgba(254,243,199,0.3));
    backdrop-filter: blur(80px);
    z-index: -1;
}
.preview-container {
    width: 100%;
    max-width: 500px;
    position: relative;
}
.result-card {
    width: 100%;
    position: relative;
    text-align: center;
}
#resultImg {
    width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}
#resultDraggableText,
#resultPolaroidText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: pre-wrap;
    max-width: 90%;
    text-align: center;
}
.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.15);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    z-index: 999;
}

/* 关键：引导层居中，不挤压、不竖排 */
.empty-guide {
    width: 100%;
    height: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 0;
}

.go-make-btn {
    padding: 16px 40px;
    background: linear-gradient(135deg, rgba(255,228,235,0.7), rgba(219,234,254,0.7), rgba(232,221,255,0.7));
    backdrop-filter: blur(12px);
    border: 1px solid #fff;
    border-radius: 28px;
    color: #7b61ff;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 20px;
}

/* 文字正常居中、不竖排、不拆字母 */
.guide-tip {
    font-size: 14px;
    color: #6b7280;
    white-space: normal;
    word-wrap: break-word;
    overflow-wrap: break-word;
    max-width: 320px;
    line-height: 1.5;
    text-align: center;
}

.site-link {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #9ca3af;
}
</style>
</head>

<body>
<button class="back-btn" id="backBtn">recreate</button>

<div class="preview-container">
    <div class="result-card">
        <img id="resultImg" alt="preview">
        <div id="resultDraggableText"></div>
        <div id="resultPolaroidText"></div>

        <div class="empty-guide" id="emptyGuide">
            <button class="go-make-btn" id="goMakeBtn">📸 start making</button>
            <p class="guide-tip">Let’s start creating your custom NFC images!</p>
        </div>
    </div>
</div>

<a class="site-link">你的链接 © 2026</a>

<script>
const imgUrl = localStorage.getItem('nfcImage');
const styleData = JSON.parse(localStorage.getItem('nfcTextStyle') || '{}');

if (imgUrl) {
    emptyGuide.style.display = 'none';
    backBtn.style.display = 'block';
    resultImg.src = imgUrl;
}

goMakeBtn.onclick = () => location.href = 'upload.html';
backBtn.onclick = () => location.href = 'upload.html';

// ======================== 仅追加以下修复代码，无任何删减 ========================
// 1. 读取编辑页保存的文字内容
const textContent = localStorage.getItem('nfcText') || '';

// 2. 获取文字展示元素
const resultDraggableText = document.getElementById('resultDraggableText');
const resultPolaroidText = document.getElementById('resultPolaroidText');

// 3. 设置文字内容（核心：修复文字不显示）
resultDraggableText.textContent = textContent;
resultPolaroidText.textContent = textContent;

// 4. 应用编辑页保存的样式（完整还原所有样式）
// 4.1 拍立得模式切换
if (styleData.isPolaroid) {
    resultDraggableText.style.display = 'none';
    resultPolaroidText.style.display = 'block';
    // 拍立得文字调整为底部居中
    resultPolaroidText.style.top = 'auto';
    resultPolaroidText.style.bottom = '0';
    resultPolaroidText.style.transform = 'translateX(-50%)';
    resultPolaroidText.style.width = '100%';
}

// 4.2 字体大小
if (styleData.fontSize) {
    resultDraggableText.style.fontSize = `${styleData.fontSize}px`;
    resultPolaroidText.style.fontSize = `${styleData.fontSize}px`;
}

// 4.3 文字颜色
if (styleData.color) {
    resultDraggableText.style.color = styleData.color;
    resultPolaroidText.style.color = styleData.color;
}

// 4.4 文字阴影/外发光
if (styleData.textShadow) {
    resultDraggableText.style.textShadow = styleData.textShadow;
    resultPolaroidText.style.textShadow = styleData.textShadow;
}

// 4.5 背景框样式
if (styleData.bg) {
    resultDraggableText.style.background = styleData.bg;
    resultPolaroidText.style.background = styleData.bg;
    
    // 背景内边距
    if (styleData.bgPadding) {
        resultDraggableText.style.padding = `${styleData.bgPadding}px ${styleData.bgPadding * 1.6}px`;
        resultPolaroidText.style.padding = `${styleData.bgPadding}px ${styleData.bgPadding * 1.6}px`;
    }
    
    // 背景圆角
    if (styleData.bgRadius) {
        resultDraggableText.style.borderRadius = `${styleData.bgRadius}px`;
        resultPolaroidText.style.borderRadius = `${styleData.bgRadius}px`;
    }
}

// 4.6 拖拽位置（仅悬浮文字生效）
if (styleData.left && styleData.top && !styleData.isPolaroid) {
    resultDraggableText.style.left = styleData.left;
    resultDraggableText.style.top = styleData.top;
    resultDraggableText.style.transform = 'none';
}
// ======================== 修复代码结束 ========================
</script>
</body>
</html>
