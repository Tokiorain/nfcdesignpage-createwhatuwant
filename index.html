<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 核心：UTF-8编码声明，解决字符解析问题 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NFC图文制作 | 成果预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 兜底字体，兼容所有设备 */
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        /* 粉蓝黄混合弥散背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(255, 228, 235, 0.3),
                rgba(219, 234, 254, 0.3),
                rgba(254, 243, 199, 0.3)
            );
            backdrop-filter: blur(80px);
            -webkit-backdrop-filter: blur(80px);
            z-index: -1;
            overflow: hidden;
        }
        /* 核心预览容器 */
        .preview-container {
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .result-card {
            position: relative;
            width: 100%;
            height: auto;
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }
        #resultImg {
            width: 100%;
            height: auto;
            max-height: 100vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        /* 拍立得文字层 */
        #resultPolaroidText {
            position: relative;
            width: 100%;
            padding-top: 16px;
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }
        #resultPolaroidText.show {
            display: block;
        }
        /* 图片文字层 */
        #resultDraggableText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        }
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            z-index: 999;
            display: none;
        }
        .back-btn:hover {
            opacity: 1;
        }
        /* 引导层 */
        .empty-guide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box; /* 防止padding撑出宽度 */
            min-width: 300px; /* 给父容器最小宽度，避免压缩文字 */
        }
        /* 弥散按钮 */
        .go-make-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, 
                rgba(255, 228, 235, 0.7),
                rgba(219, 234, 254, 0.7),
                rgba(232, 221, 255, 0.7));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            color: #7b61ff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 6px 20px rgba(180, 190, 250, 0.15);
            transition: all 0.3s ease;
            outline: none;
            border: none;
        }
        .go-make-btn:hover {
            background: linear-gradient(135deg, 
                rgba(255, 228, 235, 0.85),
                rgba(219, 234, 254, 0.85),
                rgba(232, 221, 255, 0.85));
            box-shadow: 0 8px 24px rgba(180, 190, 250, 0.2);
            transform: translateY(-2px);
        }
        /* 摇晃动画 */
        @keyframes shake {
            0% { transform: rotate(0deg) translateY(0); }
            20% { transform: rotate(-5deg) translateY(0); }
            40% { transform: rotate(5deg) translateY(0); }
            60% { transform: rotate(-3deg) translateY(0); }
            80% { transform: rotate(3deg) translateY(0); }
            100% { transform: rotate(0deg) translateY(0); }
        }
        .btn-shake {
            animation: shake 0.5s ease-in-out;
        }
        /* 核心修复：引导文字排版（解决一个字母占一行） */
        .guide-tip {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 60px;
            /* 允许正常换行，取消强制单行 */
            white-space: normal;
            /* 保证单词不被拆分成单个字母 */
            word-wrap: break-word;
            overflow-wrap: break-word;
            /* 限制最大宽度，避免撑满屏幕 */
            max-width: 90%;
            /* 行高舒适，换行后不拥挤 */
            line-height: 1.5;
            /* 文字居中，排版更整齐 */
            text-align: center;
            /* 确保容器跟随内容宽度，不歪 */
            display: inline-block;
        }
        /* 底部链接 */
        .site-link {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #9ca3af;
            text-decoration: none;
            border: none;
            background: transparent;
        }
        .site-link:hover {
            color: #6b7280;
            text-decoration: underline;
        }

        /* ========== 手机适配 ========== */
        /* 小屏手机（320-375px） */
        @media (max-width: 375px) {
            .guide-tip {
                font-size: 13px;
                max-width: 95%;
                line-height: 1.6;
            }
            .go-make-btn {
                padding: 14px 30px;
                font-size: 16px;
            }
            #resultImg {
                max-width: 95vw;
                height: auto;
            }
            .site-link {
                font-size: 11px;
                padding: 0 10px;
                text-align: center;
            }
        }
        /* 平板/大屏手机 */
        @media (min-width: 376px) and (max-width: 768px) {
            .go-make-btn {
                padding: 15px 35px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" id="backBtn">recreate</button>
    <div class="preview-container">
        <div class="result-card">
            <img id="resultImg" alt="preview">
            <div id="resultDraggableText"></div>
            <div id="resultPolaroidText"></div>
            <div class="empty-guide" id="emptyGuide">
                <button class="go-make-btn" id="goMakeBtn">📸  start making</button>
                <p class="guide-tip">Let’s start creating your custom NFC images!</p>
            </div>
        </div>
    </div>
    <a href="https://你的独立站链接.com" class="site-link" target="_blank">你的独立站名称 | copyright © 2026</a>

    <script>
        const imgUrl = localStorage.getItem('nfcImage');
        const styleData = JSON.parse(localStorage.getItem('nfcTextStyle') || '{}');
        const resultImg = document.getElementById('resultImg');
        const resultDraggableText = document.getElementById('resultDraggableText');
        const resultPolaroidText = document.getElementById('resultPolaroidText');
        const backBtn = document.getElementById('backBtn');
        const emptyGuide = document.getElementById('emptyGuide');
        const goMakeBtn = document.getElementById('goMakeBtn');

        // 有图片就显示，无图片显示引导页
        if (imgUrl) {
            emptyGuide.style.display = 'none';
            backBtn.style.display = 'block';
            initResultStyle();
        } else {
            resultImg.style.display = 'none';
            resultDraggableText.style.display = 'none';
            resultPolaroidText.style.display = 'none';
        }

        function initResultStyle() {
            resultImg.src = imgUrl;
            resultImg.style.display = 'block';
            const textContent = styleData.text || '';
            resultDraggableText.textContent = textContent;
            resultPolaroidText.textContent = textContent;

            if (textContent) {
                const fontSize = styleData.fontSize || 24;
                resultDraggableText.style.fontSize = `${fontSize}px`;
                resultPolaroidText.style.fontSize = `${fontSize}px`;

                resultDraggableText.style.color = styleData.color || '#ffffff';
                resultPolaroidText.style.color = styleData.color || '#ffffff';

                if (styleData.bg) {
                    resultDraggableText.style.background = styleData.bg;
                    resultPolaroidText.style.background = styleData.bg;
                    const bgPadding = styleData.bgPadding || 10;
                    resultDraggableText.style.padding = `${bgPadding}px ${bgPadding * 1.6}px`;
                    resultPolaroidText.style.padding = `${bgPadding}px ${bgPadding * 1.6}px`;
                    const bgRadius = styleData.bgRadius || 8;
                    resultDraggableText.style.borderRadius = `${bgRadius}px`;
                    resultPolaroidText.style.borderRadius = `${bgRadius}px`;
                    if (styleData.isPolaroid) {
                        resultPolaroidText.style.display = 'inline-block';
                        resultPolaroidText.style.margin = '0 auto';
                    }
                } else {
                    resultDraggableText.style.background = 'transparent';
                    resultPolaroidText.style.background = 'transparent';
                }

                resultDraggableText.style.textShadow = styleData.textShadow || '0 2px 5px rgba(0,0,0,0.6)';
                resultPolaroidText.style.textShadow = styleData.textShadow || '0 2px 5px rgba(0,0,0,0.6)';

                if (styleData.left && styleData.top && !styleData.isPolaroid) {
                    resultDraggableText.style.left = styleData.left;
                    resultDraggableText.style.top = styleData.top;
                    resultDraggableText.style.transform = 'none';
                }

                if (styleData.isPolaroid) {
                    resultDraggableText.style.display = 'none';
                    resultPolaroidText.classList.add('show');
                } else {
                    resultPolaroidText.style.display = 'none';
                    resultDraggableText.style.display = 'block';
                }
            } else {
                resultDraggableText.style.display = 'none';
                resultPolaroidText.style.display = 'none';
            }
        }

        // 按钮点击事件
        backBtn.addEventListener('click', () => {
            window.location.href = './upload.html';
        });
        goMakeBtn.addEventListener('click', () => {
            window.location.href = './editor.html';
        });
        goMakeBtn.addEventListener('click', function() {
            this.classList.add('btn-shake');
            setTimeout(() => {
                this.classList.remove('btn-shake');
            }, 500);
        });

        // 窗口适配
        window.addEventListener('resize', () => {
            if (imgUrl) {
                resultImg.style.maxHeight = `${window.innerHeight}px`;
            }
        });
    </script>
</body>
</html>
